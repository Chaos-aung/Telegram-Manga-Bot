<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MangaStream</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --accent: #e63946;
    --accent2: #ff6b6b;
    --text: #f0f0f0;
    --muted: #888;
    --tg-radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* Header */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
  #search-wrap { position: relative; }
  #search {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px 7px 32px;
    color: var(--text); font-size: 14px; width: 160px;
    outline: none; transition: border 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  /* Nav tabs */
  #tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    color: var(--muted); border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* Content area */
  #content { padding: 16px; min-height: calc(100vh - 120px); }

  /* Skeleton */
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Grid of manga cards */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }

  .manga-card {
    background: var(--surface);
    border-radius: var(--tg-radius);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .manga-card:active { transform: scale(0.97); border-color: var(--accent); }
  .manga-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
  .manga-card .thumb-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--surface2); }
  .manga-card .info { padding: 8px 10px 10px; }
  .manga-card .title { font-size: 12px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .manga-card .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .manga-card .badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent); color: white;
    font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
  }

  /* Detail view */
  #detail { display: none; }
  #detail.active { display: block; }
  #grid-view.hidden { display: none; }

  .detail-hero { position: relative; }
  .detail-hero img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
  .detail-hero-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(13,13,15,0.97));
    padding: 40px 16px 16px;
  }
  .detail-hero-overlay h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; line-height: 1.1; }
  .detail-hero-overlay p { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.6); color: white;
    border: none; border-radius: 20px;
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    position: absolute; top: 12px; left: 12px; z-index: 10;
  }

  .detail-body { padding: 16px; }
  .excerpt { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 16px; }
  .read-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--accent); color: white;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;
    transition: background 0.15s;
    text-decoration: none; text-align: center;
  }
  .read-btn:hover { background: var(--accent2); }

  /* List view (chapters) */
  .chapter-list { margin-top: 20px; }
  .chapter-list h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .chapter-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 8px; margin-bottom: 8px;
    cursor: pointer; border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .chapter-item:active { border-color: var(--accent); }
  .chapter-item .ch-name { font-size: 14px; font-weight: 500; }
  .chapter-item .ch-date { font-size: 12px; color: var(--muted); }
  .chevron { color: var(--muted); font-size: 16px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* Error */
  .error-msg { background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.3); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #ff8a90; }

  /* Load more */
  #load-more-btn {
    display: block; width: 100%; margin-top: 20px;
    padding: 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; cursor: pointer;
    transition: border-color 0.15s;
  }
  #load-more-btn:hover { border-color: var(--accent); }
  #load-more-btn:disabled { opacity: 0.4; cursor: default; }

  /* Telegram MainButton override hint area */
  .tg-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
</style>
</head>
<body>

<div id="header">
  <h1>MangaStream</h1>
  <div id="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="search" placeholder="Search manga…" autocomplete="off"/>
  </div>
</div>

<div id="tabs">
  <button class="tab active" data-cat="">Latest</button>
  <button class="tab" data-cat="manga">Manga</button>
  <button class="tab" data-cat="manhwa">Manhwa</button>
  <button class="tab" data-cat="manhua">Manhua</button>
</div>

<div id="content">
  <div id="grid-view">
    <div id="grid"></div>
    <button id="load-more-btn" style="display:none;">Load more</button>
  </div>
  <div id="detail"></div>
</div>

<script>
const WP_BASE = 'https://mangaboost.com/wp-json/wp/v2';
const tg = window.Telegram?.WebApp;

// Init Telegram Web App
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

let currentPage = 1;
let currentCat = '';
let currentSearch = '';
let isLoading = false;
let totalPages = 1;

const grid = document.getElementById('grid');
const detail = document.getElementById('detail');
const gridView = document.getElementById('grid-view');
const loadMoreBtn = document.getElementById('load-more-btn');
const searchInput = document.getElementById('search');

// ---- FETCH POSTS ----
async function fetchPosts(page = 1, append = false) {
  if (isLoading) return;
  isLoading = true;
  loadMoreBtn.disabled = true;

  if (!append) {
    grid.innerHTML = skeletons(6);
    loadMoreBtn.style.display = 'none';
  }

  let url = `${WP_BASE}/posts?_embed&per_page=12&page=${page}&orderby=date`;
  if (currentCat) url += `&categories_name=${encodeURIComponent(currentCat)}`;
  if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    totalPages = parseInt(res.headers.get('X-WP-TotalPages') || '1');
    const posts = await res.json();

    if (!append) grid.innerHTML = '';

    if (posts.length === 0 && !append) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📚</div><p>No manga found</p></div>`;
    } else {
      posts.forEach(p => grid.insertAdjacentHTML('beforeend', renderCard(p)));
      grid.querySelectorAll('.manga-card').forEach(c => {
        c.addEventListener('click', () => showDetail(c.dataset.id));
      });
    }

    loadMoreBtn.style.display = (currentPage < totalPages) ? 'block' : 'none';
  } catch (err) {
    if (!append) grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">⚠️ Could not load posts. Check CORS settings on your WordPress site.<br><small style="opacity:0.7">${err}</small></div>`;
  }

  isLoading = false;
  loadMoreBtn.disabled = false;
}

// ---- RENDER CARD ----
function renderCard(post) {
  const thumb = post._embedded?.['wp:featuredmedia']?.[0]?.media_details?.sizes?.medium?.source_url
              || post._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
  const title = post.title.rendered.replace(/<[^>]*>/g, '');
  const date = new Date(post.date).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  const imgHtml = thumb
    ? `<img src="${thumb}" alt="" loading="lazy"/>`
    : `<div class="thumb-placeholder"></div>`;
  return `<div class="manga-card" data-id="${post.id}">
    ${imgHtml}
    <div class="info">
      <div class="title">${title}</div>
      <div class="meta">${date}</div>
    </div>
  </div>`;
}

// ---- DETAIL VIEW ----
async function showDetail(id) {
  gridView.classList.add('hidden');
  detail.classList.add('active');
  detail.innerHTML = `<div style="padding:60px 20px;text-align:center;color:var(--muted)">Loading…</div>`;

  if (tg) {
    tg.BackButton.show();
    tg.BackButton.onClick(goBack);
  }

  try {
    const res = await fetch(`${WP_BASE}/posts/${id}?_embed`);
    const post = await res.json();

    const thumb = post._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
    const title = post.title.rendered.replace(/<[^>]*>/g, '');
    const excerpt = post.excerpt.rendered.replace(/<[^>]*>/g, '').slice(0, 200) + '…';
    const link = post.link;

    detail.innerHTML = `
      <div class="detail-hero">
        ${thumb ? `<img src="${thumb}" alt=""/>` : `<div style="height:200px;background:var(--surface2)"></div>`}
        <button class="back-btn" id="back-btn">← Back</button>
        <div class="detail-hero-overlay">
          <h2>${title}</h2>
          <p>${new Date(post.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</p>
        </div>
      </div>
      <div class="detail-body">
        <p class="excerpt">${excerpt}</p>
        <a href="${link}" class="read-btn" target="_blank">📖 Read Full Chapter</a>
        <div class="chapter-list">
          <h3>More from this series</h3>
          <div id="related-posts"><div style="color:var(--muted);font-size:13px">Loading related…</div></div>
        </div>
      </div>
      <div class="tg-safe"></div>
    `;

    document.getElementById('back-btn').addEventListener('click', goBack);

    // Fetch related
    const cats = post.categories?.join(',');
    if (cats) {
      const rRes = await fetch(`${WP_BASE}/posts?_embed&per_page=5&categories=${cats}&exclude=${id}`);
      const related = await rRes.json();
      const relDiv = document.getElementById('related-posts');
      relDiv.innerHTML = related.length
        ? related.map(r => `
          <div class="chapter-item" data-id="${r.id}">
            <span class="ch-name">${r.title.rendered.replace(/<[^>]*>/g,'')}</span>
            <span class="ch-date">${new Date(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
          </div>`).join('')
        : `<p style="color:var(--muted);font-size:13px">No related posts found.</p>`;
      relDiv.querySelectorAll('.chapter-item').forEach(el => el.addEventListener('click', () => showDetail(el.dataset.id)));
    }

  } catch (err) {
    detail.innerHTML = `<div style="padding:16px"><div class="error-msg">⚠️ Failed to load manga.<br><small>${err}</small></div><br><button class="back-btn" style="position:static;background:var(--surface2)" id="back-btn2">← Back</button></div>`;
    document.getElementById('back-btn2').addEventListener('click', goBack);
  }
}

function goBack() {
  detail.classList.remove('active');
  detail.innerHTML = '';
  gridView.classList.remove('hidden');
  if (tg) tg.BackButton.hide();
}

// ---- SKELETONS ----
function skeletons(n) {
  return Array.from({length:n}, () => `
    <div style="border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border)">
      <div class="skeleton" style="aspect-ratio:3/4;width:100%"></div>
      <div style="padding:8px 10px 12px">
        <div class="skeleton" style="height:12px;margin-bottom:6px;border-radius:4px"></div>
        <div class="skeleton" style="height:10px;width:60%;border-radius:4px"></div>
      </div>
    </div>`).join('');
}

// ---- TABS ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    currentPage = 1;
    goBack();
    fetchPosts(1, false);
  });
});

// ---- SEARCH ----
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = searchInput.value.trim();
    currentPage = 1;
    fetchPosts(1, false);
  }, 400);
});

// ---- LOAD MORE ----
loadMoreBtn.addEventListener('click', () => {
  currentPage++;
  fetchPosts(currentPage, true);
});

// ---- INIT ----
fetchPosts(1, false);
</script>
</body>
</html>
